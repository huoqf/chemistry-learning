name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (architecture checks)
        run: |
          node scripts/check-font-size.mjs
          node scripts/check-no-raf.mjs
          node scripts/check-no-marker.mjs
          node scripts/check-large-files.mjs

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Upload dist
        if: matrix.node-version == 22 && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
